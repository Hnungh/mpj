<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cart — Bards</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --black:    #0A0A0A;
            --white:    #FAFAFA;
            --orange:   #FF4F00;
            --red:      #C8001A;
            --gray-50:  #F9F9F7;
            --gray-100: #F2F2F0;
            --gray-200: #E4E4E2;
            --gray-300: #C8C8C6;
            --gray-400: #8A8A88;
            --gray-600: #4A4A48;
            --radius:    14px;
            --radius-sm: 10px;
            --nav-h:     60px;
            --bar-h:     80px;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { scroll-behavior:smooth; }
        body {
            font-family:'Space Grotesk',sans-serif;
            background:var(--gray-100); color:var(--black);
            overscroll-behavior:none; min-height:100vh;
            padding-bottom:var(--bar-h);
        }

        /* NAV */
        .nav {
            position:fixed; top:0; left:0; right:0; z-index:300;
            height:var(--nav-h);
            display:flex; align-items:center; justify-content:space-between;
            padding:0 18px;
            background:rgba(250,250,250,.92);
            backdrop-filter:blur(18px) saturate(160%);
            -webkit-backdrop-filter:blur(18px) saturate(160%);
            border-bottom:1px solid var(--gray-200);
        }
        .nav-left  { display:flex; align-items:center; gap:12px; flex:1; min-width:0; }
        .nav-right { width:36px; display:flex; justify-content:flex-end; flex-shrink:0; }
        .icon-btn {
            width:36px; height:36px; border-radius:50%;
            background:var(--gray-100); border:none;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:background .18s,transform .12s;
            text-decoration:none; color:var(--black); flex-shrink:0;
        }
        .icon-btn:active { background:var(--gray-200); transform:scale(.9); }
        .brand {
            font-family:'Bebas Neue'; font-size:21px; letter-spacing:3px;
            color:var(--black); text-decoration:none; white-space:nowrap;
        }
        .edit-btn {
            font-size:13px; font-weight:600; color:var(--gray-600);
            background:none; border:none; cursor:pointer; padding:4px 0;
            transition:color .18s; white-space:nowrap; line-height:1;
        }
        .edit-btn:active  { opacity:.6; }
        .edit-btn.in-edit { color:var(--orange); }

        /* PAGE — single centred column */
        .page {
            margin-top:var(--nav-h);
            max-width:720px;
            margin-left:auto; margin-right:auto;
            padding:0 14px;
        }
        @media (min-width:900px) { .page { padding:0 32px; } }

        .cart-header { padding:18px 0 12px; display:flex; align-items:baseline; gap:10px; }
        .cart-title  { font-family:'Bebas Neue'; font-size:24px; letter-spacing:3px; }
        .cart-count  { font-family:'DM Mono',monospace; font-size:12px; color:var(--gray-400); }

        /* CHECKBOX */
        .cb {
            width:20px; height:20px; border-radius:6px;
            border:2px solid var(--gray-300); background:var(--white);
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0; transition:all .15s; cursor:pointer;
        }
        .cb.on      { background:var(--black); border-color:var(--black); }
        .cb.partial { background:var(--gray-200); border-color:var(--gray-400); }
        .cb svg     { display:none; }
        .cb.on svg  { display:block; }

        /* ITEM LIST */
        .item-list { display:flex; flex-direction:column; gap:10px; }
        .item-row {
            display:flex; align-items:stretch;
            background:var(--white); border:1.5px solid var(--gray-200);
            border-radius:var(--radius); overflow:hidden;
            transition:border-color .18s, box-shadow .18s;
        }
        .item-row.selected { border-color:var(--black); box-shadow:0 0 0 1px var(--black); }
        .item-cb {
            width:40px; flex-shrink:0;
            display:flex; align-items:center; justify-content:center; cursor:pointer;
        }
        .item-img {
            width:96px; min-width:96px; height:96px; flex-shrink:0;
            overflow:hidden; background:var(--gray-100); cursor:pointer;
            border-radius:calc(var(--radius) - 1.5px) 0 0 calc(var(--radius) - 1.5px);
            align-self:center;
        }
        .item-img img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .3s; }
        .item-img:hover img { transform:scale(1.05); }
        .item-body {
            flex:1; padding:11px 12px;
            display:flex; flex-direction:column; justify-content:space-between; min-width:0;
        }
        .item-top  { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; }
        .item-name {
            font-size:13px; font-weight:600; line-height:1.35;
            flex:1; min-width:0;
            display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
            overflow:hidden; text-decoration:none; color:var(--black);
        }
        .item-name:hover { text-decoration:underline; text-underline-offset:3px; }
        .item-del {
            width:26px; height:26px; border-radius:7px;
            background:none; border:none; cursor:pointer;
            display:none; align-items:center; justify-content:center;
            color:var(--gray-300); flex-shrink:0; transition:color .15s,background .15s;
        }
        .edit-mode .item-del { display:flex; }
        .item-del:active { color:var(--red); background:rgba(200,0,26,.07); }
        .item-meta { display:flex; gap:5px; margin-top:4px; flex-wrap:wrap; }
        .meta-tag  {
            font-size:10px; font-weight:600; padding:2px 7px;
            border-radius:5px; background:var(--gray-100); color:var(--gray-600); white-space:nowrap;
        }
        .item-bottom { display:flex; align-items:center; justify-content:space-between; margin-top:8px; gap:8px; }
        .item-price  { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; color:var(--red); }
        .item-unit   { font-family:'DM Mono',monospace; font-size:10px; color:var(--gray-400); margin-top:2px; }
        .qty-ctl {
            display:flex; align-items:center;
            background:var(--gray-100); border:1.5px solid var(--gray-200);
            border-radius:8px; overflow:hidden; user-select:none; flex-shrink:0;
        }
        .q-btn {
            width:28px; height:28px; border:none; background:none; color:var(--black);
            cursor:pointer; font-size:16px;
            display:flex; align-items:center; justify-content:center; transition:background .12s;
        }
        .q-btn:active { background:var(--gray-200); }
        .q-val { width:28px; text-align:center; font-family:'DM Mono',monospace; font-size:12px; font-weight:500; }

        /* EMPTY */
        .empty-wrap { display:none; flex-direction:column; align-items:center; padding:40px 0 28px; text-align:center; }
        .empty-wrap.show { display:flex; }
        .empty-icon  { width:60px; height:60px; border-radius:50%; background:var(--gray-200); display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
        .empty-title { font-size:15px; font-weight:600; }
        .empty-sub   { font-size:12px; color:var(--gray-400); margin-top:4px; line-height:1.55; }
        .empty-cta   {
            margin-top:18px; height:42px; padding:0 24px;
            background:var(--black); color:#fff; border:none;
            border-radius:var(--radius-sm); font-family:'Bebas Neue';
            font-size:15px; letter-spacing:2px;
            text-decoration:none; display:inline-flex; align-items:center; gap:8px; cursor:pointer;
        }

        /* SKELETON */
        .skel-card { display:flex; background:var(--white); border-radius:var(--radius); overflow:hidden; border:1.5px solid var(--gray-200); height:108px; }
        .skel-cb   { width:40px; }
        .skel-img  { width:96px; }
        .skel-body { flex:1; padding:12px; display:flex; flex-direction:column; gap:9px; }
        .skel-line { border-radius:5px; }
        @keyframes shimmer { 0%{background-position:-600px 0} 100%{background-position:600px 0} }
        .skel-cb,.skel-img,.skel-line {
            background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%);
            background-size:1200px 100%; animation:shimmer 1.4s infinite;
        }

        /* REC */
        .rec-wrap   { padding:24px 0 28px; }
        .rec-hd     { display:flex; align-items:center; margin-bottom:13px; }
        .rec-hd-title { font-family:'Bebas Neue'; font-size:17px; letter-spacing:2.5px; }
        .rec-grid   { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        @media (min-width:900px) { .rec-grid { grid-template-columns:repeat(4,1fr); } }

        .p-card {
            background:var(--white); border-radius:var(--radius);
            border:1px solid var(--gray-200); overflow:hidden;
            display:flex; flex-direction:column;
            text-decoration:none; color:inherit; position:relative;
            transition:transform .22s,box-shadow .22s;
        }
        .p-card:active { transform:scale(.975); box-shadow:0 6px 24px rgba(0,0,0,.09); }
        .p-card-img { aspect-ratio:1/1; overflow:hidden; background:var(--gray-100); position:relative; }
        .p-card-img img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .38s; }
        .p-tag {
            position:absolute; top:9px; left:9px; z-index:2;
            background:var(--black); color:#fff;
            font-family:'DM Mono',monospace; font-size:8px;
            letter-spacing:1.5px; text-transform:uppercase;
            padding:3px 9px; border-radius:20px;
        }
        .p-tag.orange { background:var(--orange); }
        .p-tag.low    { background:var(--gray-600); top:auto; bottom:9px; }
        .p-card-body  { padding:10px 11px 13px; flex:1; display:flex; flex-direction:column; gap:7px; }
        .p-name       { font-size:12px; font-weight:600; line-height:1.35; }
        .p-meta       { display:flex; align-items:center; justify-content:space-between; }
        .p-price      { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:var(--red); }
        .p-colors     { display:flex; gap:4px; }
        .p-dot        { width:10px; height:10px; border-radius:50%; border:1.5px solid rgba(255,255,255,.7); box-shadow:0 0 0 1px rgba(0,0,0,.12); }

        /* BOTTOM BAR — identical on mobile & desktop, aligned to page */
        .bottom-bar {
            display:none; position:fixed; bottom:0; left:0; right:0; z-index:200;
            background:rgba(250,250,250,.97);
            backdrop-filter:blur(20px) saturate(160%);
            -webkit-backdrop-filter:blur(20px) saturate(160%);
            border-top:1px solid var(--gray-200);
            height:var(--bar-h); align-items:center; justify-content:center;
        }
        .bottom-bar.show { display:flex; }
        .bar-inner {
            width:100%; max-width:720px; padding:0 14px;
            display:flex; align-items:center; gap:12px;
        }
        @media (min-width:900px) { .bar-inner { padding:0 32px; } }

        .bar-all-wrap { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; flex-shrink:0; }
        .bar-all-lbl  { font-size:9px; font-weight:700; color:var(--gray-400); letter-spacing:.5px; text-transform:uppercase; line-height:1; }
        .bar-price-wrap { flex:1; min-width:0; }
        .bar-total { font-family:'DM Mono',monospace; font-size:18px; font-weight:500; color:var(--red); line-height:1; }
        .bar-items { font-size:10px; color:var(--gray-400); margin-top:2px; }
        .bar-ck {
            flex-shrink:0; height:46px; padding:0 22px;
            background:var(--black); color:#fff; border:none;
            border-radius:var(--radius-sm); font-family:'Bebas Neue';
            font-size:14px; letter-spacing:2px; cursor:pointer; white-space:nowrap;
            transition:opacity .18s,transform .1s;
        }
        .bar-ck:active   { opacity:.82; transform:scale(.97); }
        .bar-ck:disabled { background:var(--gray-200); color:var(--gray-400); cursor:default; transform:none; }

        /* TOAST */
        .toast {
            position:fixed; bottom:calc(var(--bar-h) + 10px); left:50%;
            transform:translateX(-50%) translateY(6px);
            background:var(--black); color:#fff;
            padding:11px 16px 11px 12px; border-radius:13px;
            z-index:9999; opacity:0; transition:opacity .26s,transform .26s;
            display:flex; align-items:center; gap:9px;
            pointer-events:none; box-shadow:0 6px 20px rgba(0,0,0,.25);
            min-width:190px; white-space:nowrap;
        }
        .toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast-icon { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .toast-icon.ok   { background:rgba(22,163,74,.25); }
        .toast-icon.warn { background:rgba(234,179,8,.2); }
        .toast-ttl  { font-size:12px; font-weight:700; }
        .toast-sub  { font-size:11px; color:rgba(255,255,255,.5); }
        .toast-text { display:flex; flex-direction:column; gap:1px; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        @keyframes spin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        .fu { animation:fadeUp .36s ease both; }
        .d1 { animation-delay:.05s; }
        .d2 { animation-delay:.10s; }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-left">
        <button class="icon-btn" onclick="history.back()" aria-label="Back">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 11.5L6 8l3.5-3.5"/></svg>
        </button>
        <a href="index.html" class="brand">BARDS</a>
    </div>
    <div class="nav-right">
        <button class="edit-btn" id="editBtn" onclick="toggleEdit()" style="visibility:hidden">Edit</button>
    </div>
</nav>

<div class="page">

    <div class="cart-header fu">
        <span class="cart-title">MY CART</span>
        <span class="cart-count" id="cartCount">—</span>
    </div>

    <div class="item-list" id="skelList">
        <div class="skel-card"><div class="skel-cb"></div><div class="skel-img"></div><div class="skel-body"><div class="skel-line" style="height:12px;width:65%"></div><div class="skel-line" style="height:10px;width:40%"></div><div class="skel-line" style="height:10px;width:55%"></div></div></div>
        <div class="skel-card"><div class="skel-cb"></div><div class="skel-img"></div><div class="skel-body"><div class="skel-line" style="height:12px;width:55%"></div><div class="skel-line" style="height:10px;width:35%"></div><div class="skel-line" style="height:10px;width:50%"></div></div></div>
    </div>

    <div class="item-list" id="itemList" style="display:none;"></div>

    <div class="empty-wrap" id="emptyWrap">
        <div class="empty-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#9A9A95" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
        </div>
        <div class="empty-title">Your cart is empty</div>
        <div class="empty-sub">Looks like you haven't added anything yet.</div>
        <a href="all-products.html" class="empty-cta">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            SHOP NOW
        </a>
    </div>

    <div class="rec-wrap fu d2" id="recWrap">
        <div class="rec-hd"><span class="rec-hd-title">You May Also Like</span></div>
        <div class="rec-grid" id="recGrid"></div>
    </div>

</div>

<div class="bottom-bar" id="bottomBar">
    <div class="bar-inner">
        <div class="bar-all-wrap" onclick="toggleSelectAll()">
            <div class="cb" id="barAllCb">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <span class="bar-all-lbl">All</span>
        </div>
        <div class="bar-price-wrap">
            <div class="bar-total" id="barTotal">$0.00</div>
            <div class="bar-items" id="barItems">0 items selected</div>
        </div>
        <button class="bar-ck" id="barCk" onclick="goCheckout()" disabled>
            CHECKOUT&thinsp;(<span id="barSelCount">0</span>)
        </button>
    </div>
</div>

<div class="toast" id="toast">
    <div class="toast-icon" id="toastIcon"></div>
    <div class="toast-text">
        <div class="toast-ttl" id="toastTtl"></div>
        <div class="toast-sub" id="toastSub"></div>
    </div>
</div>

<script>
const PRODUCTS={
'oversized-tee-black':{name:'Classic Black Oversized Tee',price:790,tag:'BESTSELLER',tagOrange:true,stock:'in-stock',images:['https://hnungh.github.io/mpj/img/oversized-tee-black.jpg'],colors:[{name:'Noir Black',hex:'#111111'},{name:'Stone White',hex:'#EDE9E1'}]},
'cargo-pants-olive':{name:'Military Olive Cargo Pants',price:1590,tag:'NEW',tagOrange:false,stock:'in-stock',images:['https://hnungh.github.io/mpj/img/cargo-pants-olive.jpg'],colors:[{name:'Olive Green',hex:'#6B7C4A'},{name:'Tactical Black',hex:'#2A2A2A'}]},
'hoodie-grey':{name:'Stone Grey Pullover Hoodie',price:1290,tag:'POPULAR',tagOrange:false,stock:'in-stock',images:['https://hnungh.github.io/mpj/img/hoodie-grey.jpg'],colors:[{name:'Stone Grey',hex:'#9A9A95'},{name:'Midnight Navy',hex:'#1A2240'}]},
'sunglasses-retro':{name:'Retro Square Sunglasses',price:890,tag:'LIMITED',tagOrange:true,stock:'low-stock',images:['https://hnungh.github.io/mpj/img/sunglasses-retro.jpg'],colors:[{name:'Glossy Black',hex:'#111111'},{name:'Tortoise',hex:'#8B5E3C'}]},
'oversized-tee-white':{name:'Stone White Oversized Tee',price:790,tag:'NEW',tagOrange:false,stock:'in-stock',images:['https://hnungh.github.io/mpj/img/oversized-tee-black.jpg'],colors:[{name:'Stone White',hex:'#EDE9E1'},{name:'Noir Black',hex:'#111111'}]},
'cargo-pants-black':{name:'Tactical Black Cargo Pants',price:1590,tag:'NEW',tagOrange:false,stock:'in-stock',images:['https://hnungh.github.io/mpj/img/cargo-pants-olive.jpg'],colors:[{name:'Tactical Black',hex:'#2A2A2A'},{name:'Olive Green',hex:'#6B7C4A'}]},
'hoodie-navy':{name:'Midnight Navy Pullover Hoodie',price:1290,tag:'NEW',tagOrange:false,stock:'in-stock',images:['https://hnungh.github.io/mpj/img/hoodie-grey.jpg'],colors:[{name:'Midnight Navy',hex:'#1A2240'},{name:'Stone Grey',hex:'#9A9A95'}]},
'sunglasses-black':{name:'Classic Black Sunglasses',price:890,tag:'NEW',tagOrange:false,stock:'in-stock',images:['https://hnungh.github.io/mpj/img/sunglasses-retro.jpg'],colors:[{name:'Glossy Black',hex:'#111111'}]}
};

const CART_KEY='BARDS_CART';
let cart=[],editMode=false,selected=new Set();

window.onload=function(){
    setTimeout(()=>{
        cart=JSON.parse(localStorage.getItem(CART_KEY)||'[]');
        const b=sessionStorage.getItem('BUY_NOW_ID');
        if(b){const i=cart.findIndex(c=>c.id===b);if(i!==-1)selected.add(i);sessionStorage.removeItem('BUY_NOW_ID');}
        document.getElementById('skelList').style.display='none';
        document.getElementById('itemList').style.display='';
        render();buildRec();
    },280);
};

function render(){
    const has=cart.length>0;
    const tot=cart.reduce((s,c)=>s+c.quantity,0);
    document.getElementById('cartCount').textContent=`${tot} item${tot!==1?'s':''}`;
    document.getElementById('emptyWrap').classList.toggle('show',!has);
    document.getElementById('bottomBar').classList.toggle('show',has);
    document.getElementById('editBtn').style.visibility=has?'visible':'hidden';
    selected=new Set([...selected].filter(i=>i<cart.length));
    const list=document.getElementById('itemList');
    if(has){
        list.querySelectorAll('.item-row').forEach(el=>{if(+el.dataset.idx>=cart.length)el.remove();});
        cart.forEach((item,idx)=>{
            const ex=list.querySelector(`.item-row[data-idx="${idx}"]`);
            if(ex)patchRow(ex,item,idx);
            else{const d=document.createElement('div');d.innerHTML=rowHTML(item,idx);list.appendChild(d.firstElementChild);}
        });
        list.classList.toggle('edit-mode',editMode);
    }else{list.innerHTML='';list.classList.remove('edit-mode');}
    syncSelectUI();updateSummary();
}

function patchRow(row,item,idx){
    const s=selected.has(idx);
    row.classList.toggle('selected',s);
    row.querySelector('.cb')?.classList.toggle('on',s);
    const p=row.querySelector('.item-price');if(p)p.textContent=fmtUSD(item.price*item.quantity);
    const u=row.querySelector('.item-unit');if(u)u.textContent=item.quantity>1?`${fmtUSD(item.price)} each`:'';
    const q=row.querySelector('.q-val');if(q)q.textContent=item.quantity;
}

function rowHTML(item,idx){
    const s=selected.has(idx);
    return `<div class="item-row fu${s?' selected':''}" data-idx="${idx}" style="animation-delay:${idx*.05}s">
    <div class="item-cb" onclick="toggleItem(${idx})"><div class="cb${s?' on':''}"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div></div>
    <div class="item-img" onclick="location.href='product.html?id=${item.id}'"><img src="${item.image}" loading="lazy" alt="${item.name}"></div>
    <div class="item-body">
        <div class="item-top">
            <a class="item-name" href="product.html?id=${item.id}">${item.name}</a>
            <button class="item-del" onclick="removeItem(${idx})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="item-meta"><span class="meta-tag">${item.color}</span><span class="meta-tag">${item.size}</span></div>
        <div class="item-bottom">
            <div><div class="item-price">${fmtUSD(item.price*item.quantity)}</div><div class="item-unit">${item.quantity>1?`${fmtUSD(item.price)} each`:''}</div></div>
            <div class="qty-ctl"><button class="q-btn" onclick="changeQty(${idx},-1)">−</button><div class="q-val">${item.quantity}</div><button class="q-btn" onclick="changeQty(${idx},1)">+</button></div>
        </div>
    </div>
</div>`;
}

function toggleItem(idx){selected.has(idx)?selected.delete(idx):selected.add(idx);const r=document.querySelector(`.item-row[data-idx="${idx}"]`);if(r)patchRow(r,cart[idx],idx);syncSelectUI();updateSummary();}
function toggleSelectAll(){if(selected.size===cart.length)selected.clear();else cart.forEach((_,i)=>selected.add(i));render();}
function syncSelectUI(){
    const t=cart.length,s=selected.size;
    const cb=document.getElementById('barAllCb');
    if(cb){cb.classList.remove('on','partial');if(s>0&&s<t)cb.classList.add('partial');if(s===t&&t>0)cb.classList.add('on');}
    document.getElementById('barSelCount').textContent=s;
    document.getElementById('barCk').disabled=s===0;
}
function toggleEdit(){
    editMode=!editMode;
    const btn=document.getElementById('editBtn');
    btn.textContent=editMode?'Done':'Edit';
    btn.classList.toggle('in-edit',editMode);
    document.getElementById('itemList').classList.toggle('edit-mode',editMode);
}
function changeQty(idx,delta){
    cart[idx].quantity=Math.max(1,Math.min(30,cart[idx].quantity+delta));
    saveCart();
    const r=document.querySelector(`.item-row[data-idx="${idx}"]`);if(r)patchRow(r,cart[idx],idx);
    const t=cart.reduce((s,c)=>s+c.quantity,0);
    document.getElementById('cartCount').textContent=`${t} item${t!==1?'s':''}`;
    updateSummary();
}
function removeItem(idx){
    const row=document.querySelector(`.item-row[data-idx="${idx}"]`);
    const go=()=>{
        const n=new Set();selected.forEach(i=>{if(i<idx)n.add(i);else if(i>idx)n.add(i-1);});
        selected.clear();n.forEach(i=>selected.add(i));
        cart.splice(idx,1);saveCart();
        if(!cart.length&&editMode){editMode=false;document.getElementById('editBtn').textContent='Edit';document.getElementById('editBtn').classList.remove('in-edit');}
        render();buildRec();
    };
    if(row){row.style.transition='opacity .18s,transform .18s';row.style.opacity='0';row.style.transform='translateX(-5px)';setTimeout(go,200);}else go();
}
function updateSummary(){
    const items=selected.size>0?[...selected].map(i=>cart[i]):[];
    const sub=items.reduce((s,c)=>s+c.price*c.quantity,0);
    const qty=items.reduce((s,c)=>s+c.quantity,0);
    document.getElementById('barTotal').textContent=fmtUSD(sub);
    document.getElementById('barItems').textContent=`${qty} item${qty!==1?'s':''} selected`;
}
let _ck=false;
function goCheckout(){
    if(!selected.size||_ck)return;_ck=true;
    sessionStorage.setItem('CHECKOUT_ITEMS',JSON.stringify([...selected].map(i=>cart[i])));
    sessionStorage.setItem('CHECKOUT_SHIPFEE','0');
    const S=`<svg style="animation:spin .8s linear infinite" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`;
    const b=document.getElementById('barCk');if(b){b.disabled=true;b.innerHTML=`${S} Processing…`;b.style.opacity='.7';b.style.letterSpacing='0';}
    setTimeout(()=>{location.href='checkout.html';},380);
}
function buildRec(){
    const inCart=new Set(cart.map(c=>c.id));
    const cands=Object.entries(PRODUCTS).filter(([id])=>!inCart.has(id));
    const wrap=document.getElementById('recWrap'),grid=document.getElementById('recGrid');
    if(!wrap||!grid)return;
    if(!cands.length){wrap.style.display='none';return;}
    wrap.style.display='';
    grid.innerHTML=cands.map(([id,p])=>{
        const dots=p.colors.map(c=>`<div class="p-dot" style="background:${c.hex}"></div>`).join('');
        const low=p.stock==='low-stock'?`<div class="p-tag low">LOW STOCK</div>`:'';
        return `<a href="product.html?id=${id}" class="p-card"><div class="p-card-img"><img src="${p.images[0]}" loading="lazy" alt="${p.name}"><div class="p-tag${p.tagOrange?' orange':''}">${p.tag}</div>${low}</div><div class="p-card-body"><div class="p-name">${p.name}</div><div class="p-meta"><div class="p-price">$${(p.price/33).toFixed(2)}</div><div class="p-colors">${dots}</div></div></div></a>`;
    }).join('');
}
function fmtUSD(thb){return`$${(thb/33).toFixed(2)}`;}
function saveCart(){localStorage.setItem(CART_KEY,JSON.stringify(cart));}
let _tt;
function showToast(type,title,sub){
    const ic=document.getElementById('toastIcon');
    ic.className=`toast-icon ${type==='warn'?'warn':'ok'}`;
    document.getElementById('toastTtl').textContent=title;
    document.getElementById('toastSub').textContent=sub||'';
    const t=document.getElementById('toast');t.classList.add('on');
    clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('on'),2600);
}
</script>
</body>
</html>
