<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Orders — Bards</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --black:    #0A0A0A;
            --white:    #FAFAFA;
            --gray-50:  #F9F9F7;
            --gray-100: #F2F2F0;
            --gray-200: #E4E4E2;
            --gray-300: #C8C8C6;
            --gray-400: #8A8A88;
            --gray-600: #4A4A48;
            --orange:   #FF4F00;
            --red:      #C8001A;
            --green:    #16A34A;
            --blue:     #2563EB;
            --radius:    14px;
            --radius-sm: 10px;
            --nav-h:     60px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { scroll-behavior:smooth; }
        body { font-family:'Space Grotesk',sans-serif; background:var(--gray-100); color:var(--black); overscroll-behavior:none; min-height:100vh; padding-bottom:40px; }

        /* NAV */
        .nav {
            position:fixed; top:0; left:0; right:0; z-index:200; height:var(--nav-h);
            display:flex; align-items:center; justify-content:space-between;
            padding:0 18px;
            background:rgba(250,250,250,.92); backdrop-filter:blur(18px) saturate(160%);
            -webkit-backdrop-filter:blur(18px) saturate(160%);
            border-bottom:1px solid var(--gray-200);
        }
        .nav-left  { display:flex; align-items:center; gap:12px; }
        .nav-right { display:flex; align-items:center; gap:4px; }
        .brand { font-family:'Bebas Neue'; font-size:21px; letter-spacing:3px; color:var(--black); text-decoration:none; }
        .icon-btn {
            width:36px; height:36px; border-radius:50%; background:var(--gray-100); border:none;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:background .18s,transform .12s;
            text-decoration:none; color:var(--black); position:relative;
        }
        .icon-btn:active { background:var(--gray-200); transform:scale(.9); }
        .cart-wrap { position:relative; }
        .cart-badge {
            position:absolute; top:-2px; right:-2px; background:var(--orange); color:#fff;
            font-size:8px; font-weight:700; font-family:'DM Mono',monospace;
            min-width:15px; height:15px; border-radius:8px;
            display:none; align-items:center; justify-content:center;
            padding:0 3px; border:1.5px solid var(--white);
        }
        .page-start { height:var(--nav-h); }

        /* ── FILTER TABS ── */
        .filter-bar {
            position:sticky; top:var(--nav-h); z-index:90;
            background:rgba(250,250,250,.95); backdrop-filter:blur(16px);
            -webkit-backdrop-filter:blur(16px);
            border-bottom:1px solid var(--gray-200);
            padding:10px 0;
        }
        .filter-scroll { display:flex; gap:7px; padding:0 18px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
        .filter-scroll::-webkit-scrollbar { display:none; }
        .f-tab {
            height:32px; padding:0 14px; border:1.5px solid var(--gray-200); border-radius:30px;
            font-size:11px; font-weight:600; cursor:pointer; background:var(--white);
            color:var(--gray-600); transition:all .18s; white-space:nowrap; flex-shrink:0;
            display:flex; align-items:center; gap:5px; font-family:'Space Grotesk',sans-serif;
        }
        .f-tab.on { background:var(--black); border-color:var(--black); color:#fff; }
        .f-tab:active { opacity:.7; }
        .f-cnt { font-family:'DM Mono',monospace; font-size:9px; background:rgba(0,0,0,.07); border-radius:8px; padding:1px 5px; }
        .f-tab.on .f-cnt { background:rgba(255,255,255,.18); }

        /* ── PAGE ── */
        .page { max-width:800px; margin:0 auto; padding:16px 14px 0; }

        .results-row {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:12px;
        }
        .results-label { font-family:'DM Mono',monospace; font-size:10px; color:var(--gray-400); letter-spacing:.5px; }

        /* ── ORDER CARD ── */
        .order-list { display:flex; flex-direction:column; gap:10px; }

        .order-card {
            background:var(--white); border:1.5px solid var(--gray-200);
            border-radius:var(--radius); overflow:hidden;
            transition:transform .18s,box-shadow .18s;
        }
        .order-card-hd {
            display:flex; align-items:center; justify-content:space-between;
            padding:12px 14px 10px;
            border-bottom:1px solid var(--gray-100);
        }
        .order-id-wrap { display:flex; flex-direction:column; gap:2px; }
        .order-id { font-family:'DM Mono',monospace; font-size:12px; font-weight:500; color:var(--black); letter-spacing:.5px; }
        .order-date { font-size:10px; color:var(--gray-400); }
        .order-status { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:4px 10px; border-radius:20px; }
        .status-delivered { background:#DCFCE7; color:var(--green); }
        .status-shipped   { background:#DBEAFE; color:var(--blue); }
        .status-pending   { background:#FEF3C7; color:#B45309; }
        .status-cancelled { background:#FEE2E2; color:var(--red); }

        /* items strip */
        .order-items-strip { display:flex; gap:8px; padding:12px 14px; align-items:center; }
        .order-thumb-stack { display:flex; position:relative; }
        .order-thumb {
            width:52px; height:52px; border-radius:9px; object-fit:cover;
            border:2px solid var(--white); flex-shrink:0;
        }
        .order-thumb + .order-thumb { margin-left:-16px; }
        .order-more {
            width:52px; height:52px; border-radius:9px;
            background:var(--gray-100); border:2px solid var(--white);
            display:flex; align-items:center; justify-content:center;
            font-size:11px; font-weight:700; color:var(--gray-400);
            margin-left:-16px; flex-shrink:0; font-family:'DM Mono',monospace;
        }
        .order-summary { flex:1; min-width:0; margin-left:4px; }
        .order-item-count { font-size:12px; font-weight:600; }
        .order-total { font-family:'DM Mono',monospace; font-size:18px; font-weight:500; color:var(--red); margin-top:2px; }

        /* TRACKING BAR */
        .order-track-wrap { padding:0 14px 14px; }
        .track-bar { display:flex; align-items:center; gap:0; margin-bottom:8px; }
        .track-step { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
        .track-dot {
            width:10px; height:10px; border-radius:50%; background:var(--gray-200); position:relative; z-index:1;
        }
        .track-dot.done    { background:var(--green); }
        .track-dot.done::after { content:''; position:absolute; inset:-3px; border-radius:50%; border:1.5px solid var(--green); opacity:.3; }
        .track-dot.current { background:var(--orange); }
        .track-dot.current::after { content:''; position:absolute; inset:-3px; border-radius:50%; border:1.5px solid var(--orange); opacity:.4; }
        .track-line { flex:1; height:2px; background:var(--gray-200); border-radius:1px; margin-top:-18px; }
        .track-line.done { background:var(--green); }
        .track-label { font-size:8px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--gray-400); margin-top:2px; }
        .track-step.done    .track-label { color:var(--green); }
        .track-step.current .track-label { color:var(--orange); }

        /* ACTION ROW */
        .order-actions {
            display:flex; gap:8px; padding:0 14px 14px;
        }
        .order-btn {
            flex:1; height:38px; border-radius:var(--radius-sm);
            font-size:12px; font-weight:600; cursor:pointer; border:none;
            display:flex; align-items:center; justify-content:center; gap:5px;
            transition:opacity .18s,transform .12s;
        }
        .order-btn:active { opacity:.78; transform:scale(.97); }
        .order-btn.primary   { background:var(--black); color:#fff; }
        .order-btn.secondary { background:var(--gray-100); color:var(--black); border:1.5px solid var(--gray-200); }
        .order-btn.danger    { background:#FFF5F5; color:var(--red); border:1.5px solid #FECACA; }

        /* ── DETAIL PANEL (slide up) ── */
        .mask {
            position:fixed; inset:0; z-index:300;
            background:rgba(10,10,10,.55); display:none; opacity:0;
            transition:opacity .32s ease;
            backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
        }
        .mask.on { opacity:1; }
        .detail-sheet {
            position:fixed; bottom:-100%; left:0; right:0; z-index:301;
            background:var(--white); border-radius:24px 24px 0 0;
            max-height:88vh; overflow-y:auto;
            transition:bottom .4s cubic-bezier(.22,1,.36,1);
            max-width:800px; margin:0 auto;
            box-shadow:0 -4px 30px rgba(0,0,0,.1);
        }
        .detail-sheet.on { bottom:0; }
        .sheet-handle { width:38px; height:4px; border-radius:2px; background:var(--gray-200); margin:10px auto 0; }
        .detail-nav {
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 18px 10px;
            border-bottom:1px solid var(--gray-100);
        }
        .detail-title { font-family:'Bebas Neue'; font-size:18px; letter-spacing:2px; }
        .close-btn {
            width:30px; height:30px; border-radius:50%;
            background:var(--gray-100); border:none;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; color:var(--gray-400); transition:all .15s;
        }
        .close-btn:active { background:var(--gray-200); }

        .detail-body { padding:16px 18px 32px; }

        /* Detail status + tracking */
        .detail-status-row { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
        .detail-status-badge { font-size:11px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; padding:5px 12px; border-radius:20px; }

        /* Detail items */
        .detail-items-title { font-family:'Bebas Neue'; font-size:14px; letter-spacing:2px; color:var(--gray-400); margin-bottom:10px; }
        .detail-item {
            display:flex; gap:12px; align-items:center;
            padding:10px 0; border-bottom:1px solid var(--gray-100);
        }
        .detail-item:last-child { border-bottom:none; }
        .di-img { width:56px; height:56px; border-radius:9px; object-fit:cover; border:1px solid var(--gray-200); flex-shrink:0; }
        .di-info { flex:1; min-width:0; }
        .di-name { font-size:13px; font-weight:600; line-height:1.3; }
        .di-meta { font-size:11px; color:var(--gray-400); margin-top:2px; }
        .di-price { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:var(--red); flex-shrink:0; }

        /* Detail totals */
        .detail-totals { margin-top:16px; background:var(--gray-50); border-radius:var(--radius-sm); padding:14px; }
        .tot-row { display:flex; justify-content:space-between; margin-bottom:7px; }
        .tot-row:last-child { margin-bottom:0; }
        .tot-lbl { font-size:12px; color:var(--gray-400); }
        .tot-val { font-family:'DM Mono',monospace; font-size:12px; font-weight:500; color:var(--gray-600); }
        .tot-divider { border:none; border-top:1px solid var(--gray-200); margin:10px 0; }
        .tot-total-lbl { font-size:13px; font-weight:700; }
        .tot-total-val { font-family:'DM Mono',monospace; font-size:16px; font-weight:500; color:var(--red); }

        /* Detail shipping */
        .detail-ship { margin-top:14px; background:var(--gray-50); border-radius:var(--radius-sm); padding:14px; }
        .detail-ship-title { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray-400); margin-bottom:8px; }
        .detail-ship-name { font-size:13px; font-weight:700; }
        .detail-ship-line { font-size:12px; color:var(--gray-600); margin-top:3px; line-height:1.5; }
        .detail-ship-phone { font-family:'DM Mono',monospace; font-size:11px; color:var(--gray-400); margin-top:5px; }

        /* Detail actions */
        .detail-actions { display:flex; gap:8px; margin-top:16px; }
        .detail-btn {
            flex:1; height:46px; border-radius:var(--radius-sm);
            font-size:13px; font-weight:600; cursor:pointer; border:none;
            display:flex; align-items:center; justify-content:center; gap:6px;
            transition:opacity .18s,transform .12s;
        }
        .detail-btn:active { opacity:.78; transform:scale(.97); }
        .detail-btn.primary   { background:var(--black); color:#fff; }
        .detail-btn.secondary { background:var(--gray-100); color:var(--black); border:1.5px solid var(--gray-200); }

        /* Empty */
        .empty-wrap { padding:64px 20px; text-align:center; display:none; }
        .empty-wrap.show { display:block; }
        .empty-icon  { font-size:40px; margin-bottom:14px; }
        .empty-title { font-size:15px; font-weight:600; }
        .empty-sub   { font-size:12px; color:var(--gray-400); margin-top:5px; line-height:1.65; }
        .empty-cta {
            margin-top:18px; display:inline-flex; align-items:center; gap:7px;
            height:42px; padding:0 22px; background:var(--black); color:#fff;
            border:none; border-radius:var(--radius-sm);
            font-family:'Bebas Neue'; font-size:15px; letter-spacing:2px;
            cursor:pointer; text-decoration:none; transition:opacity .18s;
        }
        .empty-cta:active { opacity:.78; }

        /* TOAST */
        .toast {
            position:fixed; bottom:24px; left:50%;
            transform:translateX(-50%) translateY(6px);
            background:var(--black); color:#fff;
            padding:12px 18px 12px 14px; border-radius:14px;
            font-size:13px; font-weight:500; z-index:9999;
            opacity:0; transition:opacity .28s,transform .28s;
            white-space:nowrap; display:flex; align-items:center; gap:10px;
            pointer-events:none; box-shadow:0 8px 24px rgba(0,0,0,.28); min-width:220px;
        }
        .toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast-iw { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .toast-iw.ok   { background:rgba(22,163,74,.25); }
        .toast-iw.warn { background:rgba(234,179,8,.2); }
        .toast-text { display:flex; flex-direction:column; gap:1px; }
        .toast-title { font-size:12px; font-weight:700; letter-spacing:.3px; }
        .toast-sub   { font-size:11px; color:rgba(255,255,255,.55); }

        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        @keyframes spin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        .fu  { animation:fadeUp .38s ease both; }
        .d1  { animation-delay:.05s; }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-left">
        <a href="account.html" class="icon-btn" aria-label="Back">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 11.5L6 8l3.5-3.5"/></svg>
        </a>
        <a href="index.html" class="brand">BARDS</a>
    </div>
    <div class="nav-right">
        <div class="cart-wrap">
            <a href="cart.html" class="icon-btn" aria-label="Cart">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            </a>
            <span class="cart-badge" id="cartBadge"></span>
        </div>
    </div>
</nav>

<div class="page-start"></div>

<!-- FILTER TABS -->
<div class="filter-bar">
    <div class="filter-scroll" id="filterScroll"></div>
</div>

<div class="page">
    <div class="results-row fu">
        <span class="results-label" id="resultsLabel">— orders</span>
    </div>
    <div class="order-list" id="orderList"></div>
    <div class="empty-wrap" id="emptyWrap">
        <div class="empty-icon">📦</div>
        <div class="empty-title">No orders found</div>
        <div class="empty-sub">Once you place an order, it will appear here.</div>
        <a href="index.html" class="empty-cta">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            SHOP NOW
        </a>
    </div>
</div>

<!-- MASK + DETAIL SHEET -->
<div class="mask" id="mask" onclick="closeDetail()"></div>
<div class="detail-sheet" id="detailSheet">
    <div class="sheet-handle"></div>
    <div class="detail-nav">
        <span class="detail-title" id="detailTitle">Order #—</span>
        <button class="close-btn" onclick="closeDetail()">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="1" y1="1" x2="12" y2="12"/><line x1="12" y1="1" x2="1" y2="12"/></svg>
        </button>
    </div>
    <div class="detail-body" id="detailBody"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
    <div class="toast-iw" id="toastIw"></div>
    <div class="toast-text">
        <div class="toast-title" id="toastTitle"></div>
        <div class="toast-sub" id="toastSub"></div>
    </div>
</div>

<script>
/* ═══════════════════════════════════
   FILTER CONFIG
═══════════════════════════════════ */
const FILTERS = [
    { id:'all',       label:'All' },
    { id:'pending',   label:'Pending' },
    { id:'shipped',   label:'Shipped' },
    { id:'delivered', label:'Delivered' },
    { id:'cancelled', label:'Cancelled' },
];

const STATUS_MAP = {
    delivered: ['status-delivered','Delivered'],
    shipped:   ['status-shipped','Shipped'],
    pending:   ['status-pending','Pending'],
    cancelled: ['status-cancelled','Cancelled']
};

const TRACK_STEPS = ['Ordered','Packed','Shipped','Delivered'];
const TRACK_IDX   = { pending:0, shipped:2, delivered:3, cancelled:-1 };

let orders      = [];
let activeFilter = 'all';
let detailOrder = null;

/* ═══════════════════════════════════
   BOOT
═══════════════════════════════════ */
window.onload = function() {
    orders = JSON.parse(localStorage.getItem('BARDS_ORDERS') || '[]').reverse();
    buildFilterTabs();
    renderOrders();
    updateBadge();

    // If coming with ?id= open that order's detail
    const qId = new URLSearchParams(location.search).get('id');
    if (qId) {
        const o = orders.find(x => x.id === qId);
        if (o) setTimeout(() => openDetail(o), 400);
    }
};

/* ═══════════════════════════════════
   FILTER TABS
═══════════════════════════════════ */
function buildFilterTabs() {
    const scroll = document.getElementById('filterScroll');
    scroll.innerHTML = FILTERS.map(f => {
        const count = f.id === 'all'
            ? orders.length
            : orders.filter(o => o.status === f.id).length;
        return `<div class="f-tab ${f.id==='all'?'on':''}" data-filter="${f.id}" onclick="setFilter('${f.id}')">
            ${f.label}
            <span class="f-cnt">${count}</span>
        </div>`;
    }).join('');
}

function setFilter(id) {
    activeFilter = id;
    document.querySelectorAll('.f-tab').forEach(t => t.classList.toggle('on', t.dataset.filter === id));
    renderOrders();
}

/* ═══════════════════════════════════
   RENDER ORDER LIST
═══════════════════════════════════ */
function renderOrders() {
    const filtered = activeFilter === 'all'
        ? orders
        : orders.filter(o => o.status === activeFilter);

    const n    = filtered.length;
    const noun = n === 1 ? 'order' : 'orders';
    document.getElementById('resultsLabel').textContent = `${n} ${noun}`;
    document.getElementById('emptyWrap').classList.toggle('show', n === 0);

    const list = document.getElementById('orderList');
    list.innerHTML = filtered.map((o,i) => orderCardHTML(o,i)).join('');
}

function orderCardHTML(o, i) {
    const [statusCls, statusLabel] = STATUS_MAP[o.status] || STATUS_MAP.pending;
    const stepIdx = TRACK_IDX[o.status] ?? 0;

    // Thumbs (show max 3 + overflow)
    const thumbs = (o.items || []).slice(0,3).map(item =>
        `<img src="${item.image}" class="order-thumb" alt="${item.name}" loading="lazy">`
    ).join('');
    const extra = o.items?.length > 3
        ? `<div class="order-more">+${o.items.length - 3}</div>`
        : '';

    // Track HTML
    let trackHTML = '';
    for (let j = 0; j < TRACK_STEPS.length; j++) {
        const done    = stepIdx >= 0 && j <= stepIdx;
        const current = stepIdx >= 0 && j === stepIdx;
        const dotCls  = current ? 'current' : (done ? 'done' : '');
        const stepCls = current ? 'current' : (done ? 'done' : '');
        const lineCls = j < stepIdx ? 'done' : '';
        trackHTML += `<div class="track-step ${stepCls}">
            <div class="track-dot ${dotCls}"></div>
            <span class="track-label">${TRACK_STEPS[j]}</span>
        </div>`;
        if (j < TRACK_STEPS.length - 1) trackHTML += `<div class="track-line ${lineCls}"></div>`;
    }

    const itemCount = o.items?.length || 0;
    const total     = '$' + Number(o.total).toFixed(2);

    // Action buttons based on status
    let actions = '';
    if (o.status === 'pending') {
        actions = `
            <button class="order-btn primary" onclick="buyAgain('${o.id}')">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 1 4 1"/><path d="M1 1l3.5 3.5A7 7 0 0 1 16 8a7 7 0 0 1-7 7 7 7 0 0 1-7-7"/></svg>
                Buy Again
            </button>
            <button class="order-btn secondary" onclick="openDetail(orders.find(x=>x.id==='${o.id}'))">Details</button>`;
    } else if (o.status === 'delivered') {
        actions = `
            <button class="order-btn primary" onclick="buyAgain('${o.id}')">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 1 4 1"/><path d="M1 1l3.5 3.5A7 7 0 0 1 16 8a7 7 0 0 1-7 7 7 7 0 0 1-7-7"/></svg>
                Buy Again
            </button>
            <button class="order-btn secondary" onclick="openDetail(orders.find(x=>x.id==='${o.id}'))">Details</button>`;
    } else {
        actions = `
            <button class="order-btn secondary" onclick="openDetail(orders.find(x=>x.id==='${o.id}'))">View Details</button>`;
    }

    return `<div class="order-card fu" style="animation-delay:${i*.04}s">
        <div class="order-card-hd">
            <div class="order-id-wrap">
                <div class="order-id">#${o.id}</div>
                <div class="order-date">${o.date || '—'}</div>
            </div>
            <span class="order-status ${statusCls}">${statusLabel}</span>
        </div>
        <div class="order-items-strip">
            <div class="order-thumb-stack">${thumbs}${extra}</div>
            <div class="order-summary">
                <div class="order-item-count">${itemCount} item${itemCount!==1?'s':''}</div>
                <div class="order-total">${total}</div>
            </div>
        </div>
        <div class="order-track-wrap">
            <div class="track-bar">${trackHTML}</div>
        </div>
        <div class="order-actions">${actions}</div>
    </div>`;
}

/* ═══════════════════════════════════
   DETAIL SHEET
═══════════════════════════════════ */
function openDetail(o) {
    if (!o) return;
    detailOrder = o;
    document.getElementById('detailTitle').innerText = 'Order #' + o.id;

    const [statusCls, statusLabel] = STATUS_MAP[o.status] || STATUS_MAP.pending;
    const stepIdx = TRACK_IDX[o.status] ?? 0;

    // Tracking
    let trackHTML = '';
    for (let j = 0; j < TRACK_STEPS.length; j++) {
        const done    = stepIdx >= 0 && j <= stepIdx;
        const current = stepIdx >= 0 && j === stepIdx;
        const dotCls  = current ? 'current' : (done ? 'done' : '');
        const stepCls = current ? 'current' : (done ? 'done' : '');
        const lineCls = j < stepIdx ? 'done' : '';
        trackHTML += `<div class="track-step ${stepCls}">
            <div class="track-dot ${dotCls}"></div>
            <span class="track-label">${TRACK_STEPS[j]}</span>
        </div>`;
        if (j < TRACK_STEPS.length - 1) trackHTML += `<div class="track-line ${lineCls}"></div>`;
    }

    // Items
    const itemsHTML = (o.items || []).map(item => `
        <div class="detail-item">
            <img class="di-img" src="${item.image}" alt="${item.name}" loading="lazy">
            <div class="di-info">
                <div class="di-name">${item.name}</div>
                <div class="di-meta">${item.color} · ${item.size} · ×${item.quantity}</div>
            </div>
            <div class="di-price">$${(item.price * item.quantity).toFixed(2)}</div>
        </div>`).join('');

    const subtotal = o.items?.reduce((s,c) => s + c.price*c.quantity, 0) || 0;
    const shipCost = o.shippingCost ?? 0;
    const total    = o.total ?? (subtotal + shipCost);

    // Shipping info
    const ship = o.shipping || {};
    const shipHTML = ship.name ? `
        <div class="detail-ship">
            <div class="detail-ship-title">Shipping Address</div>
            <div class="detail-ship-name">${ship.name}</div>
            <div class="detail-ship-line">${ship.addr1}${ship.addr2?', '+ship.addr2:''}<br>${ship.province}</div>
            <div class="detail-ship-phone">${ship.phone}</div>
        </div>` : '';

    // Action buttons
    const actionBtns = o.status !== 'cancelled'
        ? `<button class="detail-btn primary" onclick="buyAgain('${o.id}');closeDetail()">
               <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 1 4 1"/><path d="M1 1l3.5 3.5A7 7 0 0 1 16 8a7 7 0 0 1-7 7 7 7 0 0 1-7-7"/></svg>
               Buy Again
           </button>`
        : `<button class="detail-btn secondary" style="color:var(--gray-400);" disabled>Cancelled</button>`;

    document.getElementById('detailBody').innerHTML = `
        <div class="detail-status-row">
            <span class="detail-status-badge ${statusCls}">${statusLabel}</span>
            <span style="font-size:11px;color:var(--gray-400);">${o.date || ''}</span>
        </div>
        <div class="track-bar" style="margin-bottom:20px;">${trackHTML}</div>

        <div class="detail-items-title">Items</div>
        ${itemsHTML}

        <div class="detail-totals">
            <div class="tot-row"><span class="tot-lbl">Subtotal</span><span class="tot-val">$${subtotal.toFixed(2)}</span></div>
            <div class="tot-row">
                <span class="tot-lbl">Shipping</span>
                <span class="tot-val ${shipCost===0?'':'paid'}">${shipCost===0?'FREE':'$'+shipCost.toFixed(2)}</span>
            </div>
            <div class="tot-divider"></div>
            <div class="tot-row">
                <span class="tot-total-lbl">Total</span>
                <span class="tot-total-val">$${total.toFixed(2)}</span>
            </div>
        </div>

        ${shipHTML}

        <div class="detail-actions">${actionBtns}</div>
    `;

    document.getElementById('mask').style.display = 'block';
    requestAnimationFrame(() => {
        document.getElementById('mask').classList.add('on');
        document.getElementById('detailSheet').classList.add('on');
    });
}

function closeDetail() {
    document.getElementById('detailSheet').classList.remove('on');
    document.getElementById('mask').classList.remove('on');
    setTimeout(() => document.getElementById('mask').style.display = 'none', 380);
}

/* ═══════════════════════════════════
   BUY AGAIN — add all items to cart
═══════════════════════════════════ */
function buyAgain(orderId) {
    const o = orders.find(x => x.id === orderId);
    if (!o || !o.items?.length) return;

    const cart = JSON.parse(localStorage.getItem('BARDS_CART') || '[]');
    o.items.forEach(item => {
        const ex = cart.find(c => c.id===item.id && c.color===item.color && c.size===item.size);
        if (ex) ex.quantity += item.quantity;
        else cart.push({ ...item });
    });
    localStorage.setItem('BARDS_CART', JSON.stringify(cart));
    updateBadge();
    showToast('ok','Added to cart', o.items.length + ' item(s) added');
}

/* ═══════════════════════════════════
   BADGE
═══════════════════════════════════ */
function updateBadge() {
    const cart = JSON.parse(localStorage.getItem('BARDS_CART') || '[]');
    const n = cart.reduce((t,c) => t+c.quantity, 0);
    const b = document.getElementById('cartBadge');
    b.innerText = n > 99 ? '99+' : n;
    b.style.display = n > 0 ? 'flex' : 'none';
}

/* ═══════════════════════════════════
   TOAST
═══════════════════════════════════ */
const SVG_CHECK = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const SVG_WARN  = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
let _tt;
function showToast(type, title, sub) {
    const iw = document.getElementById('toastIw');
    iw.className = 'toast-iw ' + (type==='warn'?'warn':'ok');
    iw.innerHTML = type==='warn' ? SVG_WARN : SVG_CHECK;
    document.getElementById('toastTitle').innerText = title;
    document.getElementById('toastSub').innerText   = sub || '';
    const t = document.getElementById('toast'); t.classList.add('on');
    clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('on'), 2800);
}
</script>
